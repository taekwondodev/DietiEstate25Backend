# ==================== Spring Boot Generale ====================
spring.application.name=DietiEstate25Backend
spring.jackson.deserialization.fail-on-unknown-properties=true
# ==================== Test Database Configuration (PostgreSQL via Docker Compose) ====================
# Quando eseguito via docker-compose.test.yaml, usare postgres-test come hostname
# Quando eseguito localmente, sostituire con localhost
spring.datasource.url=jdbc:postgresql://postgres-test:5432/test_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=test
spring.datasource.password=test
spring.jpa.hibernate.ddl-auto=none
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1

spring.sql.init.mode=never
# ==================== JWT Configuration ====================
app.jwt.secret=V8XUeNVRbwHx4B5vHd6iDCpHtYtWBL7piqLrko0+Anw=
# ==================== Email Configuration (Dummy for Tests) ====================
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test@test.com
spring.mail.password=password
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
# ==================== GeoData Configuration ====================
GEO_KEY=test-geo-api-key
# ==================== Server Configuration ====================
server.port=8080
# ==================== Logging Configuration ====================
logging.level.root=ERROR
logging.level.org.springframework=WARN
logging.level.org.postgresql=WARN
logging.level.dietiestate25backend=INFO
